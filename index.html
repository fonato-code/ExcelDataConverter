<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExcelConverter</title>
    <style>
        :root {
            --bg: #f3efe7;
            --panel: rgba(255, 252, 247, 0.92);
            --panel-strong: #fffaf2;
            --border: rgba(82, 59, 38, 0.18);
            --border-strong: rgba(82, 59, 38, 0.28);
            --text: #2f241a;
            --muted: #6f5b4a;
            --accent: #0f766e;
            --accent-soft: rgba(15, 118, 110, 0.12);
            --shadow: 0 24px 60px rgba(85, 60, 35, 0.12);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --font-ui: "Segoe UI", "Trebuchet MS", sans-serif;
            --font-mono: "Consolas", "Courier New", monospace;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: var(--font-ui);
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 32%),
                radial-gradient(circle at right center, rgba(196, 113, 56, 0.12), transparent 28%),
                linear-gradient(180deg, #f9f5ee 0%, var(--bg) 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: linear-gradient(rgba(82, 59, 38, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(82, 59, 38, 0.03) 1px, transparent 1px);
            background-size: 22px 22px;
            mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.4), transparent);
        }

        .app-shell {
            display: grid;
            grid-template-columns: 300px minmax(0, 1fr);
            min-height: 100vh;
            gap: 24px;
            padding: 24px;
        }

        .sidebar,
        .workspace {
            position: relative;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .sidebar {
            padding: 28px 22px;
            overflow: hidden;
        }

        .sidebar::after {
            content: "";
            position: absolute;
            inset: auto -40px -60px auto;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(15, 118, 110, 0.22), transparent 68%);
        }

        .brand {
            margin-bottom: 28px;
        }

        .brand h1 {
            margin: 0;
            font-size: 1.9rem;
            line-height: 1;
        }

        .brand p {
            margin: 10px 0 0;
            color: var(--muted);
            line-height: 1.5;
        }

        .settings {
            display: grid;
            gap: 18px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        .field label,
        .toggle {
            font-size: 0.94rem;
            font-weight: 600;
            color: var(--text);
        }

        .field select,
        .field textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            font: inherit;
            color: var(--text);
            background: var(--panel-strong);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .field select:focus,
        .field textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-soft);
        }

        .toggle {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle input {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
        }

        .note {
            margin-top: 22px;
            padding: 14px 16px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.58);
            border: 1px solid rgba(82, 59, 38, 0.1);
            color: var(--muted);
            line-height: 1.5;
        }

        .workspace {
            padding: 26px;
            display: grid;
            gap: 20px;
            min-width: 0;
        }

        .workspace-header {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .workspace-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .workspace-header p {
            margin: 8px 0 0;
            color: var(--muted);
        }

        .panels {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
            min-height: 0;
        }

        .panel {
            display: grid;
            gap: 12px;
            min-width: 0;
        }

        .panel-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .panel-head strong {
            font-size: 1rem;
        }

        textarea {
            min-height: 540px;
            resize: vertical;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px;
            font: 0.95rem/1.6 var(--font-mono);
            color: var(--text);
            background: rgba(255, 255, 255, 0.82);
        }

        textarea[readonly] {
            background: rgba(247, 243, 237, 0.95);
        }

        .status {
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.94rem;
            line-height: 1.5;
            border: 1px solid transparent;
        }

        .status.info {
            background: rgba(15, 118, 110, 0.08);
            border-color: rgba(15, 118, 110, 0.16);
            color: #0f5d58;
        }

        .status.error {
            background: rgba(185, 28, 28, 0.08);
            border-color: rgba(185, 28, 28, 0.16);
            color: #991b1b;
        }

        @media (max-width: 980px) {
            .app-shell {
                grid-template-columns: 1fr;
            }

            .panels {
                grid-template-columns: 1fr;
            }

            textarea {
                min-height: 320px;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="src/js/vue.js"></script>
    <script src="src/js/app.js"></script>
</body>
</html>
